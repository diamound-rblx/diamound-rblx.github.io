<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recherche</title>

<style>
body {
  margin: 0;
  background: #1c1c1c;
  font-family: Arial;
  height: 100vh;
  display: flex;
  justify-content: center;
  padding-top: 20px;
  overflow: hidden;
}

.card {
  width: 360px;
  height: 530px;
  background: white;
  border-radius: 35px;
}

.header {
  text-align: center;
  font-size: 28px;
  margin-top: 20px;
}

.line {
  width: 80%;
  height: 3px;
  background: black;
  margin: 10px auto;
}

.content {
  padding: 20px;
}

input {
  width: 100%;
  padding: 12px;
  border-radius: 15px;
  border: none;
  background: #f2f2f2;
}

.result {
  margin-top: 10px;
  padding: 10px;
  background: #eee;
  border-radius: 10px;
  cursor: pointer;
}

/* NAVBAR */
.navbar-container {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
}

.navbar {
  position: relative;
  width: 360px;
  height: 70px;
  background: white;
  border-radius: 35px;
  display: flex;
  justify-content: space-around;
  align-items: center;
}

.active-indicator {
  position: absolute;
  width: 55px;
  height: 55px;
  background: #4da6ff;
  border-radius: 50%;
  top: 7px;
  transition: 0.35s;
}

.navbar img {
  width: 40px;
}
</style>
</head>

<body>

<div class="card">
  <div class="header">Recherche</div>
  <div class="line"></div>

  <div class="content">
    <input id="input" placeholder="Rechercher...">
    <div id="results"></div>
  </div>
</div>

<div class="navbar-container">
  <div class="navbar">
    <div class="active-indicator" id="indicator"></div>

    <a href="/"><img src="/home.png"></a>
    <a href="/search/"><img src="/search.png"></a>
    <a href="/profile/"><img src="/profile.png"></a>
  </div>
</div>

<script>
const data = [
  {id:1,name:"PC_001YouTube",type:"user"},
  {id:2,name:"MathisB11",type:"user"},
  {id:3,name:"BlocPlayStudios",type:"user"},
  {name:"Spawn",type:"map"}
];

input.oninput = () => {
  results.innerHTML = "";
  data.forEach(d => {
    if(d.name.toLowerCase().includes(input.value.toLowerCase())){
      const div = document.createElement("div");
      div.className = "result";
      div.innerText = d.name;

      div.onclick = () => {
        location.href = d.type==="user"
          ? "/user/"+d.id
          : "/map/"+d.name;
      };

      results.appendChild(div);
    }
  });
};

indicator.style.transform = "translateX(120px)";
</script>

</body>
</html>
