<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recherche</title>

<style>
body {
  margin: 0;
  background: #1c1c1c;
  font-family: Arial, sans-serif;
}

.container {
  width: 360px;
  margin: 20px auto;
  background: white;
  border-radius: 35px;
  padding: 20px;
}

input {
  width: 100%;
  padding: 10px;
  border-radius: 20px;
}

/* NAVBAR */
.navbar-container {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
}

.navbar {
  width: 360px;
  height: 70px;
  background: white;
  border-radius: 35px;
  display: flex;
  justify-content: space-around;
  align-items: center;
  position: relative;
}

.navbar img {
  width: 40px;
  height: 40px;
  z-index: 2;
}

.nav-indicator {
  position: absolute;
  width: 55px;
  height: 55px;
  background: #4da6ff;
  border-radius: 50%;
  top: 7px;
  left: 0;
  z-index: 1;
  transition: transform 0.35s ease;
}

.section-title {
  font-size: 12px;
  color: gray;
  margin-top: 15px;
}
</style>

</head>
<body>

<div class="container">

<input type="text" placeholder="Rechercher...">

<div class="section-title">Joueurs</div>
<p>PC_001</p>
<p>YouTube</p>
<p>MathisB11</p>
<p>BlocPlayStudios</p>

<div class="section-title">Maps</div>
<p>Spawn</p>

</div>

<div class="navbar-container">
  <div class="navbar">
    <div class="nav-indicator" id="indicator"></div>

    <a href="/"><img src="/home.png"></a>
    <a href="/search/"><img src="/search.png"></a>
    <a href="/profile/"><img src="/profile.png"></a>
  </div>
</div>

<script>
const indicator = document.getElementById("indicator");
const links = document.querySelectorAll(".navbar a");

function moveIndicator(el){
  const rect = el.getBoundingClientRect();
  const parent = el.parentElement.getBoundingClientRect();
  const x = rect.left - parent.left + (rect.width/2) - 27.5;
  indicator.style.transform = `translateX(${x}px)`;
}

window.addEventListener("load", ()=>{
  links.forEach(link=>{
    if(link.getAttribute("href") === "/search/"){
      moveIndicator(link);
    }
  });
});
</script>

</body>
</html>
