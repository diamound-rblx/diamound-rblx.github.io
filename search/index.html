<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diamound - Recherche</title>

<style>
body {
  margin: 0;
  background: #1c1c1c;
  font-family: Arial, sans-serif;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* CARTE */
.card {
  width: 360px;
  height: 530px;
  background: white;
  border-radius: 35px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  box-shadow: 0px 4px 10px rgba(0,0,0,0.3);
}

/* HEADER */
.header {
  text-align: center;
  font-size: 28px;
  font-weight: bold;
  margin-top: 20px;
}

.line {
  width: 80%;
  height: 3px;
  background: black;
  margin: 10px auto;
}

/* CONTENT */
.content {
  flex: 1;
  padding: 20px;
}

/* INPUT */
input {
  width: 100%;
  padding: 10px;
  border-radius: 10px;
  border: 1px solid #ccc;
  font-size: 16px;
}

/* NAVBAR */
.navbar-container {
  width: 100%;
  display: flex;
  justify-content: center;
  margin-top: 15px;
}

.navbar {
  width: 360px;
  height: 70px;
  background: white;
  border-radius: 35px;
  display: flex;
  justify-content: space-around;
  align-items: center;
  box-shadow: 0px 4px 10px rgba(0,0,0,0.3);
}

/* ICONES */
.navbar img {
  width: 40px;
  height: 40px;
  cursor: pointer;
  transition: 0.2s;
}

.navbar img:hover {
  transform: scale(1.2);
}
</style>

</head>
<body>

<div class="card">

  <div class="header">Recherche</div>
  <div class="line"></div>

  <div class="content">
    <input type="text" placeholder="Rechercher...">
  </div>

</div>

<div class="navbar-container">
  <div class="navbar">
    <a href="index.html"><img src="assets/home.png"></a>
    <a href="search.html"><img src="assets/search.png"></a>
    <a href="profile.html"><img src="assets/profile.png"></a>
  </div>
</div>

</body>
</html>
