<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diamound - Recherche</title>

<style>
body {
  margin: 0;
  background: #1c1c1c;
  font-family: Arial, sans-serif;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding-top: 20px;
  overflow: hidden;
}

/* CARTE */
.card {
  width: 360px;
  height: 530px;
  background: white;
  border-radius: 35px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  box-shadow: 0px 4px 10px rgba(0,0,0,0.3);
}

/* HEADER */
.header {
  text-align: center;
  font-size: 28px;
  font-weight: bold;
  margin-top: 20px;
}

.line {
  width: 80%;
  height: 3px;
  background: black;
  margin: 10px auto;
}

/* CONTENT */
.content {
  flex: 1;
  padding: 25px;
}

/* INPUT */
input {
  width: 100%;
  padding: 12px 15px;
  padding-right: 25px;
  border-radius: 15px;
  border: none;
  outline: none;
  font-size: 16px;
  background: #f2f2f2;
  box-sizing: border-box;
}

/* RESULTATS */
.result {
  padding: 12px;
  margin-top: 10px;
  background: #f5f5f5;
  border-radius: 12px;
  cursor: pointer;
  transition: 0.2s;
}

.result:hover {
  background: #e0e0e0;
  transform: scale(1.02);
}

/* TYPE (petit texte gris) */
.type {
  font-size: 12px;
  color: gray;
}

/* NAVBAR */
.navbar-container {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
}

.navbar {
  width: 360px;
  height: 70px;
  background: white;
  border-radius: 35px;
  display: flex;
  justify-content: space-around;
  align-items: center;
  box-shadow: 0px 4px 10px rgba(0,0,0,0.3);
}

.navbar img {
  width: 40px;
  height: 40px;
  cursor: pointer;
  transition: 0.2s;
}

.navbar img:hover {
  transform: scale(1.2);
}
</style>

</head>
<body>

<div class="card">

  <div class="header">Recherche</div>
  <div class="line"></div>

  <div class="content">

    <input type="text" id="searchInput" placeholder="Rechercher...">

    <div id="results" style="margin-top:20px;"></div>

  </div>

</div>

<div class="navbar-container">
  <div class="navbar">
    <a href="/"><img src="/home.png"></a>
    <a href="/search/"><img src="/search.png"></a>
    <a href="/profile/"><img src="/profile.png"></a>
  </div>
</div>

<script>
const input = document.getElementById("searchInput");
const results = document.getElementById("results");

// Données
const data = [
  { name: "PC_001YouTube", type: "user" },
  { name: "MathisB11", type: "user" },
  { name: "BlocPlayStudios", type: "user" },
  { name: "Spawn", type: "map" }
];

input.addEventListener("keydown", function(e) {
  if (e.key === "Enter") {
    const value = input.value.toLowerCase();
    results.innerHTML = "";

    if (value === "") {
      results.innerHTML = "Tape quelque chose...";
      return;
    }

    const filtered = data.filter(item =>
      item.name.toLowerCase().includes(value)
    );

    if (filtered.length === 0) {
      results.innerHTML = "Aucun résultat trouvé";
    } else {
      filtered.forEach(item => {
        const div = document.createElement("div");
        div.className = "result";

        div.innerHTML = `
          ${item.name}
          <div class="type">${item.type === "user" ? "Utilisateur" : "Map"}</div>
        `;

        div.onclick = () => {
          if (item.type === "user") {
            window.location.href = "/user/" + item.name;
          } else {
            window.location.href = "/game/" + item.name;
          }
        };

        results.appendChild(div);
      });
    }
  }
});
</script>

</body>
</html>
