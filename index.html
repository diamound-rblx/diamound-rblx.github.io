<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diamound</title>

<style>
body {
  margin: 0;
  background: #1c1c1c;
  font-family: Arial;
  height: 100vh;
  display: flex;
  justify-content: center;
  padding-top: 20px;
  overflow: hidden;
}

.card {
  width: 360px;
  height: 530px;
  background: white;
  border-radius: 35px;
}

.header {
  text-align: center;
  font-size: 28px;
  font-weight: bold;
  margin-top: 20px;
}

.line {
  width: 80%;
  height: 3px;
  background: black;
  margin: 10px auto;
}

/* NAVBAR */
.navbar-container {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
}

.navbar {
  position: relative;
  width: 360px;
  height: 70px;
  background: white;
  border-radius: 35px;
  display: flex;
  justify-content: space-around;
  align-items: center;
}

.active-indicator {
  position: absolute;
  width: 55px;
  height: 55px;
  background: #4da6ff;
  border-radius: 50%;
  top: 7px;
  left: 0;
  transition: 0.35s;
}

.navbar a {
  position: relative;
  z-index: 1;
}

.navbar img {
  width: 40px;
}
</style>
</head>

<body>

<div class="card">
  <div class="header">Accueil</div>
  <div class="line"></div>
</div>

<div class="navbar-container">
  <div class="navbar">
    <div class="active-indicator" id="indicator"></div>

    <a href="/" data-page="home"><img src="/home.png"></a>
    <a href="/search/" data-page="search"><img src="/search.png"></a>
    <a href="/profile/" data-page="profile"><img src="/profile.png"></a>
  </div>
</div>

<script>
function getPage() {
  const path = location.pathname;
  if (path.startsWith("/search")) return 1;
  if (path.startsWith("/profile")) return 2;
  return 0;
}

document.getElementById("indicator").style.transform =
  "translateX(" + (getPage() * 120) + "px)";
</script>

</body>
</html>
