<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Accueil</title>

<style>
body {
  margin: 0;
  background: #1c1c1c;
  font-family: Arial, sans-serif;
}

/* TA PAGE (NE PAS TOUCHER) */
.content {
  width: 360px;
  height: 530px;
  background: white;
  border-radius: 35px;
  margin: 20px auto;
}

/* NAVBAR */
.navbar-container {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
}

.navbar {
  width: 360px;
  height: 70px;
  background: white;
  border-radius: 35px;
  display: flex;
  justify-content: space-around;
  align-items: center;
  position: relative;
}

.navbar img {
  width: 40px;
  height: 40px;
  z-index: 2;
  position: relative;
}

.nav-indicator {
  position: absolute;
  width: 55px;
  height: 55px;
  background: #4da6ff;
  border-radius: 50%;
  top: 7px;
  left: 0;
  z-index: 1;
  transition: transform 0.35s ease;
}
</style>

</head>
<body>

<div class="content">
  <!-- TON CONTENU -->
</div>

<!-- NAVBAR -->
<div class="navbar-container">
  <div class="navbar">
    <div class="nav-indicator" id="indicator"></div>

    <a href="/"><img src="/home.png"></a>
    <a href="/search/"><img src="/search.png"></a>
    <a href="/profile/"><img src="/profile.png"></a>
  </div>
</div>

<script>
const indicator = document.getElementById("indicator");
const links = document.querySelectorAll(".navbar a");

function moveIndicator(el){
  const rect = el.getBoundingClientRect();
  const parent = el.parentElement.getBoundingClientRect();
  const x = rect.left - parent.left + (rect.width/2) - 27.5;
  indicator.style.transform = `translateX(${x}px)`;
}

window.addEventListener("load", ()=>{
  links.forEach(link=>{
    if(link.getAttribute("href") === "/"){
      moveIndicator(link);
    }
  });
});
</script>

</body>
</html>
