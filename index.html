<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diamound</title>

<style>
body {
  margin: 0;
  padding: 0;
  background: #1c1c1c; /* fond noir */
  font-family: Arial, sans-serif;
  height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* CARTE BLANCHE */
.card {
  width: 360px;
  height: 580px;
  background: white;
  border-radius: 35px;
  margin-top: 20px;
  box-shadow: 0px 4px 10px rgba(0,0,0,0.3);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* HEADER */
.header {
  text-align: center;
  font-size: 28px;
  font-weight: bold;
  margin-top: 20px;
}

.line {
  width: 80%;
  height: 3px;
  background: black;
  margin: 10px auto;
}

/* CONTENU */
.content {
  flex: 1;
  padding: 20px;
}

/* BARRE EN BAS (séparée) */
.navbar-container {
  width: 100%;
  display: flex;
  justify-content: center;
  margin-top: 15px;
}

.navbar {
  width: 360px;
  height: 70px;
  background: white;
  border-radius: 35px;
  display: flex;
  justify-content: space-around;
  align-items: center;
  box-shadow: 0px 4px 10px rgba(0,0,0,0.3);
}

/* ICONES */
.navbar img {
  width: 40px;
  height: 40px;
  cursor: pointer;
  transition: 0.2s;
}

.navbar img:hover {
  transform: scale(1.2);
}
</style>

</head>
<body>

  <!-- Carte blanche centrée -->
  <div class="card">
    <div class="header">Diamound</div>
    <div class="line"></div>

    <div class="content">
      Contenu ici
    </div>
  </div>

  <!-- Barre en bas, séparée -->
  <div class="navbar-container">
    <div class="navbar">
      <img src="assets/home.png" alt="Accueil">
      <img src="assets/search.png" alt="Recherche">
      <img src="assets/play.png" alt="Jouer" onclick="openGame()">
    </div>
  </div>

<script>
function openGame() {
  window.location.href = "roblox://placeId=TON_ID";
  setTimeout(() => {
    window.location.href = "https://www.roblox.com/games/TON_ID";
  }, 1500);
}
</script>

</body>
</html>
