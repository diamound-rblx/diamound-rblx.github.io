<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diamound RBLX</title>

<style>
body {
  margin: 0;
  background: #1c1c1c;
  font-family: Arial, sans-serif;
}

/* CONTENEUR GLOBAL */
.app {
  width: 100%;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* CADRE (comme ton image) */
.phone {
  width: 350px;
  height: 650px;
  background: white;
  border-radius: 35px;
  display: flex;
  flex-direction: column;
  position: relative;
}

/* HEADER */
.header {
  text-align: center;
  font-size: 26px;
  font-weight: bold;
  padding-top: 20px;
}

.line {
  width: 80%;
  height: 3px;
  background: black;
  margin: 10px auto;
}

/* CONTENT */
.content {
  flex: 1;
  padding: 20px;
}

/* NAVBAR EN BAS (comme ton dessin) */
.navbar {
  width: 90%;
  height: 70px;
  background: white;
  border-radius: 35px;

  position: absolute;
  bottom: 15px;
  left: 50%;
  transform: translateX(-50%);

  display: flex;
  justify-content: space-around;
  align-items: center;

  box-shadow: 0px 4px 10px rgba(0,0,0,0.2);
}

/* ICONES */
.navbar img {
  width: 35px;
  height: 35px;
  cursor: pointer;
}
</style>

</head>

<body>

<div class="app">

  <div class="phone">

    <div class="header">Accueil</div>
    <div class="line"></div>

    <div class="content">
      Texte ou contenu ici
    </div>

    <div class="navbar">
      <img src="assets/home.png">
      <img src="assets/search.png">
      <img src="assets/play.png" onclick="openGame()">
    </div>

  </div>

</div>

<script>
function openGame() {
  window.location.href = "roblox://placeId=TON_ID";

  setTimeout(() => {
    window.location.href = "https://www.roblox.com/games/TON_ID";
  }, 1500);
}
</script>

</body>
</html>
