<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diamound</title>

<style>
body {
  margin: 0;
  background: #1c1c1c; /* fond noir comme ton image */
  font-family: Arial, sans-serif;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* CARTE PRINCIPALE (ARRONDIE) */
.app {
  width: 360px;
  height: 700px;
  background: white;
  border-radius: 35px; /* 🔥 coins arrondis */
  display: flex;
  flex-direction: column;
  overflow: hidden; /* empêche de casser les coins */
}

/* HEADER */
.header {
  text-align: center;
  font-size: 28px;
  font-weight: bold;
  margin-top: 20px;
}

.line {
  width: 80%;
  height: 3px;
  background: black;
  margin: 10px auto;
}

/* CONTENU */
.content {
  flex: 1;
  padding: 20px;
}

/* BARRE DU BAS FIXE */
.navbar {
  height: 80px;
  background: white;
  display: flex;
  justify-content: space-around;
  align-items: center;

  border-top: 2px solid #ddd;
}

/* ICONES */
.navbar img {
  width: 40px;
  height: 40px;
  cursor: pointer;
  transition: 0.2s;
}

.navbar img:hover {
  transform: scale(1.2);
}
</style>

</head>

<body>

<div class="app">

  <div class="header">Diamound</div>
  <div class="line"></div>

  <div class="content">
    Contenu ici
  </div>

  <!-- BARRE DU BAS -->
  <div class="navbar">
    <img src="assets/home.png">
    <img src="assets/search.png">
    <img src="assets/play.png" onclick="openGame()">
  </div>

</div>

<script>
function openGame() {
  window.location.href = "roblox://placeId=TON_ID";

  setTimeout(() => {
    window.location.href = "https://www.roblox.com/games/TON_ID";
  }, 1500);
}
</script>

</body>
</html>
