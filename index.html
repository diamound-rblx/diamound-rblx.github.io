<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Diamound RBLX</title>

<style>
body {
  margin: 0;
  padding: 0;
  background: #1c1c1c;
  font-family: Arial, sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* UI Phone Frame */
.ui-frame {
  width: 360px;
  height: 720px;
  background: white;
  border-radius: 40px;
  position: relative;
  overflow: hidden;
}

/* HEADER */
.header {
  text-align: center;
  font-size: 28px;
  font-weight: bold;
  padding-top: 20px;
}

.header-line {
  width: 80%;
  height: 4px;
  background: #000;
  margin: 8px auto 12px auto;
}

/* CONTENT */
.content {
  padding: 0 20px;
  font-size: 18px;
  color: #000;
}

/* NAV BAR */
.navbar {
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  width: 320px;
  height: 70px;
  background: white;
  border-radius: 35px;
  display: flex;
  justify-content: space-around;
  align-items: center;
  box-shadow: 0px 4px 10px rgba(0,0,0,0.2);
}

.navbar img {
  width: 40px;
  height: 40px;
  cursor: pointer;
  transition: 0.2s;
}

.navbar img:hover {
  transform: scale(1.2);
}
</style>

</head>
<body>

<div class="ui-frame">

  <!-- HEADER -->
  <div class="header">Accueil</div>
  <div class="header-line"></div>

  <!-- CONTENT -->
  <div class="content">Texte ici</div>

  <!-- NAVIGATION -->
  <div class="navbar">
    <img src="https://raw.githubusercontent.com/diamound-rblx/diamound-rblx.github.io/main/home_icon.png" alt="Accueil">
    <img src="https://raw.githubusercontent.com/diamound-rblx/diamound-rblx.github.io/main/search_icon.png" alt="Recherche">
    <img src="https://raw.githubusercontent.com/diamound-rblx/diamound-rblx.github.io/main/play_icon.png" alt="Jouer" onclick="openGame()">
  </div>

</div>

<script>
function openGame() {
  const robloxLink = "roblox://placeId=TON_ID";
  const webLink = "https://www.roblox.com/games/TON_ID";
  window.location.href = robloxLink;
  setTimeout(() => { window.location.href = webLink; }, 1500);
}
</script>

</body>
</html>
