<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Diamound RBLX</title>

<style>
body {
  margin: 0;
  background: #1c1c1c;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: Arial, sans-serif;
}

/* CADRE */
.ui-frame {
  width: 360px;
  height: 720px;
  background: white;
  border-radius: 40px;
  position: relative;
  overflow: hidden;
}

/* HEADER */
.header {
  text-align: center;
  font-size: 28px;
  font-weight: bold;
  padding-top: 20px;
}

.header-line {
  width: 80%;
  height: 4px;
  background: black;
  margin: 8px auto;
}

/* CONTENT */
.content {
  padding: 20px;
}

/* NAVBAR (IMPORTANT FIX) */
.navbar {
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  width: 320px;
  height: 70px;
  background: white;
  border-radius: 35px;
  display: flex;
  justify-content: space-around;
  align-items: center;

  z-index: 10; /* 🔥 au-dessus du contenu */
  box-shadow: 0px 4px 10px rgba(0,0,0,0.2);
}

/* ICONES */
.navbar img {
  width: 40px;
  height: 40px;
  cursor: pointer;
}

/* BONUS: évite que le contenu passe dessous */
.content {
  padding-bottom: 100px;
}
</style>

</head>

<body>

<div class="ui-frame">

  <div class="header">Accueil</div>
  <div class="header-line"></div>

  <div class="content">
    Contenu ici
  </div>

  <!-- NAVBAR -->
  <div class="navbar">
    <img src="assets/home.png">
    <img src="assets/search.png">
    <img src="assets/play.png" onclick="openGame()">
  </div>

</div>

<script>
function openGame() {
  const robloxLink = "roblox://placeId=TON_ID";
  const webLink = "https://www.roblox.com/games/TON_ID";

  window.location.href = robloxLink;

  setTimeout(() => {
    window.location.href = webLink;
  }, 1500);
}
</script>

</body>
</html>
