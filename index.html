<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diamound</title>

<style>
/* 🔥 BLOQUE LE SCROLL */
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  overflow: hidden;
  background: #1c1c1c;
  font-family: Arial, sans-serif;
}

/* CENTRAGE */
body {
  display: flex;
  justify-content: center;
  align-items: center;
}

/* CARTE */
.app {
  width: 360px;
  height: 700px;
  background: white;
  border-radius: 35px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* HEADER */
.header {
  text-align: center;
  font-size: 28px;
  font-weight: bold;
  margin-top: 20px;
}

.line {
  width: 80%;
  height: 3px;
  background: black;
  margin: 10px auto;
}

/* CONTENU (prend tout l'espace disponible) */
.content {
  flex: 1;
  padding: 20px;
}

/* NAVBAR BIEN SÉPARÉE */
.navbar {
  height: 80px;
  margin: 15px; /* 🔥 espace avec les bords */
  border-radius: 25px; /* 🔥 coins arrondis */
  background: white;

  display: flex;
  justify-content: space-around;
  align-items: center;

  box-shadow: 0px 4px 10px rgba(0,0,0,0.2);
}

/* ICONES */
.navbar img {
  width: 40px;
  height: 40px;
  cursor: pointer;
  transition: 0.2s;
}

.navbar img:hover {
  transform: scale(1.2);
}
</style>

</head>

<body>

<div class="app">

  <div class="header">Diamound</div>
  <div class="line"></div>

  <div class="content">
    Contenu ici
  </div>

  <!-- BARRE EN BAS -->
  <div class="navbar">
    <img src="assets/home.png">
    <img src="assets/search.png">
    <img src="assets/play.png" onclick="openGame()">
  </div>

</div>

<script>
function openGame() {
  window.location.href = "roblox://placeId=TON_ID";

  setTimeout(() => {
    window.location.href = "https://www.roblox.com/games/TON_ID";
  }, 1500);
}
</script>

</body>
</html>
