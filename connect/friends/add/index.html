<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diamound - Ajouter des amis</title>

<style>
body {
  margin: 0;
  background: #1c1c1c;
  font-family: Arial, sans-serif;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding-top: 20px;
  overflow: hidden;
}

/* CARTE */
.card {
  width: 360px;
  height: 530px;
  background: white;
  border-radius: 35px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  box-shadow: 0px 4px 10px rgba(0,0,0,0.3);
}

/* HEADER */
.header {
  text-align: center;
  font-size: 24px;
  font-weight: bold;
  margin-top: 20px;
}

.line {
  width: 80%;
  height: 3px;
  background: black;
  margin: 10px auto;
}

/* CONTENT */
.content {
  flex: 1;
  padding: 20px;
}

/* INPUT */
input {
  width: 100%;
  padding: 12px;
  border-radius: 12px;
  border: none;
  outline: none;
  background: #f2f2f2;
  font-size: 16px;
  box-sizing: border-box;
}

/* RESULTATS */
.user {
  margin-top: 15px;
  padding: 10px;
  border-radius: 12px;
  background: #f5f5f5;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

/* NOM */
.username {
  font-weight: bold;
}

/* BOUTON AJOUT */
.add-btn {
  background: black;
  color: white;
  padding: 6px 10px;
  border-radius: 10px;
  cursor: pointer;
  transition: 0.2s;
}

.add-btn:hover {
  transform: scale(1.05);
}

/* NAVBAR */
.navbar-container {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
}

.navbar {
  width: 360px;
  height: 70px;
  background: white;
  border-radius: 35px;
  display: flex;
  justify-content: space-around;
  align-items: center;
  box-shadow: 0px 4px 10px rgba(0,0,0,0.3);
}

.navbar img {
  width: 40px;
  height: 40px;
  cursor: pointer;
  transition: 0.2s;
}

.navbar img:hover {
  transform: scale(1.2);
}
</style>

</head>
<body>

<div class="card">

  <div class="header">Ajouter des amis</div>
  <div class="line"></div>

  <div class="content">

    <input type="text" id="searchInput" placeholder="Rechercher un utilisateur...">

    <div id="results"></div>

  </div>

</div>

<div class="navbar-container">
  <div class="navbar">
    <a href="/"><img src="/home.png"></a>
    <a href="/search/"><img src="/search.png"></a>
    <a href="/profile/"><img src="/profile.png"></a>
  </div>
</div>

<script>
const input = document.getElementById("searchInput");
const results = document.getElementById("results");

// Données fake pour l'instant
const users = [
  "PC_001YouTube",
  "MathisB11",
  "BlocPlayStudios"
];

input.addEventListener("keydown", function(e) {
  if (e.key === "Enter") {
    const value = input.value.toLowerCase();
    results.innerHTML = "";

    if (value === "") {
      results.innerHTML = "Entre un pseudo.";
      return;
    }

    const filtered = users.filter(user =>
      user.toLowerCase().includes(value)
    );

    if (filtered.length === 0) {
      results.innerHTML = "Aucun utilisateur trouvé";
    } else {
      filtered.forEach(user => {
        const div = document.createElement("div");
        div.className = "user";

        div.innerHTML = `
          <span class="username">${user}</span>
          <div class="add-btn">Ajouter</div>
        `;

        results.appendChild(div);
      });
    }
  }
});
</script>

</body>ProGamer
