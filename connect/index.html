<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diamound - Connexion</title>

<style>
body {
  margin: 0;
  background: #1c1c1c;
  font-family: Arial, sans-serif;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding-top: 20px;
  overflow: hidden;
}

/* CARTE */
.card {
  width: 360px;
  height: 530px;
  background: white;
  border-radius: 35px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  box-shadow: 0px 4px 10px rgba(0,0,0,0.3);
}

/* HEADER */
.header {
  text-align: center;
  font-size: 26px;
  font-weight: bold;
  margin-top: 20px;
}

.line {
  width: 80%;
  height: 3px;
  background: black;
  margin: 10px auto;
}

/* CONTENT */
.content {
  flex: 1;
  padding: 25px;
  text-align: center;
}

/* CODE */
.code {
  font-size: 28px;
  font-weight: bold;
  margin-top: 20px;
}

/* TIMER */
.timer {
  margin-top: 15px;
  font-size: 14px;
  color: gray;
}

/* BUTTONS */
.button {
  margin-top: 15px;
  padding: 12px;
  border-radius: 12px;
  background: black;
  color: white;
  cursor: pointer;
  transition: 0.2s;
}

.button:hover {
  transform: scale(1.05);
}

/* espace entre les boutons */
.buttons-container {
  margin-top: 20px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

/* NAVBAR */
.navbar-container {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
}

.navbar {
  width: 360px;
  height: 70px;
  background: white;
  border-radius: 35px;
  display: flex;
  justify-content: space-around;
  align-items: center;
  box-shadow: 0px 4px 10px rgba(0,0,0,0.3);
}

.navbar img {
  width: 40px;
  height: 40px;
  cursor: pointer;
  transition: 0.2s;
}

.navbar img:hover {
  transform: scale(1.2);
}
</style>

</head>
<body>

<div class="card">

  <div class="header">Connexion</div>
  <div class="line"></div>

  <div class="content">

    <div>Ton code :</div>
    <div class="code" id="code"></div>

    <div class="timer" id="timer"></div>

    <!-- BOUTONS -->
    <div class="buttons-container">

      <div class="button" onclick="copyCode()">Copier le code</div>

      <div class="button" onclick="generateCode()">Générer un nouveau code</div>

    </div>

  </div>

</div>

<div class="navbar-container">
  <div class="navbar">
    <a href="/"><img src="/home.png"></a>
    <a href="/search/"><img src="/search.png"></a>
    <a href="/profile/"><img src="/profile.png"></a>
  </div>
</div>

<script>
let currentCode = "";
let expiryTime;

// Générer code
function generateCode() {
  currentCode = Math.random().toString(36).substring(2, 8).toUpperCase();
  document.getElementById("code").innerText = currentCode;

  expiryTime = Date.now() + 30 * 60 * 1000;

  updateTimer();
}

// Copier le code
function copyCode() {
  if (!currentCode) return;

  navigator.clipboard.writeText(currentCode);
  alert("Code copié !");
}

// Timer
function updateTimer() {
  const timer = document.getElementById("timer");

  const interval = setInterval(() => {
    const now = Date.now();
    const diff = expiryTime - now;

    if (diff <= 0) {
      clearInterval(interval);
      timer.innerText = "Code expiré ❌";
      return;
    }

    const minutes = Math.floor(diff / 60000);
    const seconds = Math.floor((diff % 60000) / 1000);

    timer.innerText = "Ce code expire dans " +
      minutes + "m " + seconds + "s";
  }, 1000);
}

// Génère au chargement
generateCode();
</script>

</body>
</html>
