<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diamound - Connexion</title>

<style>
body {
  margin: 0;
  background: #1c1c1c;
  font-family: Arial;
  height: 100vh;
  display: flex;
  justify-content: center;
  padding-top: 20px;
  overflow: hidden;
}

.card {
  width: 360px;
  height: 530px;
  background: white;
  border-radius: 35px;
  display: flex;
  flex-direction: column;
  text-align: center;
}

.header {
  font-size: 28px;
  font-weight: bold;
  margin-top: 20px;
}

.line {
  width: 80%;
  height: 3px;
  background: black;
  margin: 10px auto;
}

.content {
  padding: 20px;
}

/* CODE */
.code {
  font-size: 28px;
  font-weight: bold;
  margin-top: 20px;
}

/* TIMER */
.timer {
  margin-top: 15px;
  font-size: 14px;
  color: gray;
}

/* BUTTONS */
.buttons {
  margin-top: 20px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.button {
  padding: 12px;
  border-radius: 12px;
  background: black;
  color: white;
  cursor: pointer;
  transition: 0.2s;
}

.button:hover {
  transform: scale(1.05);
}

/* NAVBAR */
.navbar-container {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
}

.navbar {
  position: relative;
  width: 360px;
  height: 70px;
  background: white;
  border-radius: 35px;
  display: flex;
  justify-content: space-around;
  align-items: center;
}

.active-indicator {
  position: absolute;
  width: 55px;
  height: 55px;
  background: #4da6ff;
  border-radius: 50%;
  top: 7px;
  transition: 0.35s;
}

.navbar img {
  width: 40px;
}
</style>

</head>

<body>

<div class="card">

  <div class="header">Connexion</div>
  <div class="line"></div>

  <div class="content">

    <div>Ton code :</div>
    <div class="code" id="code"></div>

    <div class="timer" id="timer"></div>

    <div class="buttons">
      <div class="button" onclick="copyCode()">Copier le code</div>
      <div class="button" onclick="generateCode()">Générer un nouveau code</div>
    </div>

  </div>

</div>

<div class="navbar-container">
  <div class="navbar">
    <div class="active-indicator" id="indicator"></div>

    <a href="/"><img src="/home.png"></a>
    <a href="/search/"><img src="/search.png"></a>
    <a href="/profile/"><img src="/profile.png"></a>
  </div>
</div>

<script>
let currentCode;
let expiryTime;

function generateCode() {
  currentCode = Math.random().toString(36).substring(2,8).toUpperCase();
  document.getElementById("code").innerText = currentCode;

  expiryTime = Date.now() + 30*60*1000;
}

function copyCode() {
  navigator.clipboard.writeText(currentCode);
  alert("Code copié !");
}

setInterval(() => {
  const diff = expiryTime - Date.now();
  if(diff <= 0){
    document.getElementById("timer").innerText = "Code expiré ❌";
    return;
  }

  const m = Math.floor(diff/60000);
  const s = Math.floor((diff%60000)/1000);

  document.getElementById("timer").innerText =
    `Ce code expire dans ${m}m ${s}s`;

},1000);

generateCode();

/* NAVBAR */
indicator.style.transform = "translateX(120px)";
</script>

</body>
</html>
