<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connexion - Diamound</title>

<style>
body {
  margin: 0;
  background: #1c1c1c;
  font-family: Arial, sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.card {
  width: 360px;
  background: white;
  border-radius: 35px;
  padding: 25px;
  text-align: center;
  box-sizing: border-box;
}

.title {
  font-size: 20px;
  font-weight: bold;
}

.code {
  font-size: 26px;
  letter-spacing: 3px;
  margin: 20px 0;
  font-weight: bold;
}

button {
  padding: 10px 15px;
  border-radius: 20px;
  border: none;
  background: #4da6ff;
  color: white;
  margin: 5px;
  cursor: pointer;
}

.timer {
  font-size: 12px;
  color: gray;
  margin-top: 15px;
}
</style>

</head>
<body>

<div class="card">

  <div class="title">Connexion à Diamound</div>

  <div class="code" id="code">------</div>

  <button onclick="copyCode()">Copier le code</button>
  <button onclick="generateCode()">Générer un nouveau code</button>

  <div class="timer" id="timer">Ce code expire dans 30 minutes</div>

</div>

<script>
let currentCode = "";
let timeLeft = 30 * 60; // 30 minutes en secondes

function generateCode() {
  currentCode = Math.random().toString(36).substring(2, 8).toUpperCase();
  document.getElementById("code").innerText = currentCode;
  timeLeft = 30 * 60;
}

function copyCode() {
  navigator.clipboard.writeText(currentCode);
}

function updateTimer() {
  if (timeLeft > 0) {
    timeLeft--;

    let minutes = Math.floor(timeLeft / 60);
    let seconds = timeLeft % 60;

    document.getElementById("timer").innerText =
      "Ce code expire dans " + minutes + "m " + seconds + "s";
  }
}

setInterval(updateTimer, 1000);

// Génération initiale
generateCode();
</script>

</body>
</html>
