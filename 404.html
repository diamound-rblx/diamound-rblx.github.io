<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diamound - 404</title>

<style>
body {
  margin: 0;
  background: #1c1c1c;
  font-family: Arial, sans-serif;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding-top: 20px;
  overflow: hidden;
}

.card {
  width: 360px;
  height: 530px;
  background: white;
  border-radius: 35px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.header {
  text-align: center;
  font-size: 28px;
  font-weight: bold;
  margin-top: 20px;
}

.line {
  width: 80%;
  height: 3px;
  background: black;
  margin: 10px auto;
}

.content {
  flex: 1;
  padding: 20px;
}

/* NAVBAR */
.navbar-container {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
}

.navbar {
  width: 360px;
  height: 70px;
  background: white;
  border-radius: 35px;
  display: flex;
  justify-content: space-around;
  align-items: center;
  position: relative;
}

.navbar img {
  width: 40px;
  height: 40px;
  position: relative;
  z-index: 2;
}

.nav-indicator {
  position: absolute;
  width: 55px;
  height: 55px;
  background: #4da6ff;
  border-radius: 50%;
  top: 7px;
  left: 0;
  z-index: 1;
  transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
}
</style>

</head>
<body>

<div class="card">
  <div class="header">404</div>
  <div class="line"></div>

  <div class="content">
    Cette page est une erreur.
  </div>
</div>

<div class="navbar-container">
  <div class="navbar">

    <div class="nav-indicator" id="indicator"></div>

    <a href="/"><img src="/home.png"></a>
    <a href="/search/"><img src="/search.png"></a>
    <a href="/profile/"><img src="/profile.png"></a>

  </div>
</div>

<script>
const indicator = document.getElementById("indicator");
const links = document.querySelectorAll(".navbar a");

function moveIndicator(element) {
  const rect = element.getBoundingClientRect();
  const parentRect = element.parentElement.getBoundingClientRect();

  const x = rect.left - parentRect.left + (rect.width / 2) - 27.5;

  indicator.style.transform = `translateX(${x}px)`;
}

window.addEventListener("load", () => {
  moveIndicator(links[0]);
});
</script>

</body>
</html>
