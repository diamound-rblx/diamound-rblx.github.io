<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diamound - 404</title>

<style>
body {
  margin: 0;
  background: #1c1c1c;
  font-family: Arial, sans-serif;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding-top: 20px;
  overflow: hidden;
}

.card {
  width: 360px;
  height: 530px;
  background: white;
  border-radius: 35px;
  display: flex;
  flex-direction: column;
}

.header {
  text-align: center;
  font-size: 28px;
  margin-top: 20px;
}

.line {
  width: 80%;
  height: 3px;
  background: black;
  margin: 10px auto;
}

.content {
  padding: 20px;
}

/* NAVBAR */
.navbar-container {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
}

.navbar {
  position: relative;
  width: 360px;
  height: 70px;
  background: white;
  border-radius: 35px;
  display: flex;
  justify-content: space-around;
  align-items: center;
}

.nav-indicator {
  position: absolute;
  width: 55px;
  height: 55px;
  background: #4da6ff;
  border-radius: 50%;
  top: 7px;
  left: 0;
  z-index: 0;
  transition: transform 0.35s ease;
}

.navbar a { position:relative; z-index:1; }
.navbar img { width:40px; }
</style>

</head>
<body>

<div class="card">
  <div class="header">404</div>
  <div class="line"></div>

  <div class="content">
    Cette page est une erreur.
  </div>
</div>

<div class="navbar-container">
  <div class="navbar">

    <div class="nav-indicator" id="indicator"></div>

    <a href="/"><img src="/home.png"></a>
    <a href="/search/"><img src="/search.png"></a>
    <a href="/profile/"><img src="/profile.png"></a>

  </div>
</div>

<script>
document.getElementById("indicator").style.transform = "translateX(0px)";
</script>

</body>
</html>
